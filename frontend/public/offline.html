<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JusticeBot - Offline</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.4));
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #fb923c;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
        }
        .btn {
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border: none;
            border-radius: 9999px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/icons/icon-192.png" alt="JusticeBot Logo" class="logo">
        <h1>You're Offline</h1>
        <p>It seems you lost your internet connection. Don't worry, JusticeBot is still here to help once you're back online.</p>
        <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
